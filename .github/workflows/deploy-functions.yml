# Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      # Firebase Functions only auto-loads functions/.env and .env.<projectId>,
      # NOT .env.production. Write the runtime env here so getStripe() etc. can read it.
      - name: Write functions/.env
        run: |
          echo "FRONTEND_URL=https://dealecho.io" >> functions/.env
          echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> functions/.env

      - name: Build functions
        run: npm run build
        working-directory: functions

      # Deploy the smaller, isolated function groups FIRST so a 409/queue-jam in
      # the larger enterprise batch below can't stop them from deploying.
      - name: Deploy extension function
        run: firebase deploy --only functions:lookupCompanyReviews,functions:issueCustomToken --force

      - name: Wait
        run: sleep 30

      - name: Deploy review functions
        run: firebase deploy --only functions:submitReview,functions:resubmitReview,functions:onReviewWritten --force

      - name: Wait
        run: sleep 30

      - name: Deploy checkout functions
        run: firebase deploy --only functions:createCheckoutSession,functions:cancelSubscription,functions:createEnterpriseCheckout,functions:createBillingPortalSession --force

      - name: Wait
        run: sleep 30

      - name: Deploy enterprise functions
        run: firebase deploy --only functions:inviteTeamMember,functions:acceptTeamInvite,functions:updateTeamMemberRole,functions:removeTeamMember,functions:updateTeamSeats,functions:resendTeamInvite,functions:cancelPendingInvite --force

      - name: Wait
        run: sleep 30

      - name: Deploy admin functions
        run: firebase deploy --only functions:adminGetUsers,functions:adminSetRole,functions:adminDeleteContent,functions:adminEditContent,functions:adminGetPricing,functions:adminUpdatePricing,functions:adminCreateUser,functions:adminToggleUserSuspension,functions:adminDeleteUser,functions:adminSendNewsletter --force

      - name: Wait
        run: sleep 30

      - name: Deploy marketing functions
        run: firebase deploy --only functions:recordAcquisition,functions:adminGetAcquisitionReport,functions:updateMarketingProfile,functions:recordActivity --force
 



