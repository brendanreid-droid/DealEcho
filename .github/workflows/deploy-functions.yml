# Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: npm run build
        working-directory: functions

      # Deploy the smaller, isolated function groups FIRST so a 409/queue-jam in
      # the larger enterprise batch below can't stop them from deploying.
      - name: Deploy extension function
        run: firebase deploy --only functions:lookupCompanyReviews --force

      - name: Deploy review submission functions
        run: firebase deploy --only functions:submitReview,functions:resubmitReview --force

      - name: Deploy enterprise functions
        run: firebase deploy --only functions:inviteTeamMember,functions:acceptTeamInvite,functions:updateTeamMemberRole,functions:removeTeamMember,functions:updateTeamSeats,functions:resendTeamInvite,functions:cancelPendingInvite,functions:createEnterpriseCheckout --force
 



